            align-items: center;

            margin-left: 32px;

        }

            font-weight: 700;

        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.06) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateX(-50px) translateY(-50px) rotate(0deg); }
            50% { transform: translateX(50px) translateY(50px) rotate(180deg); }
        }

            flex: 1 1 340px;
        }
        .login-form-box h1 {
            color: #22223b;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 24px;
            text-align: left;
        }
        .login-form label {
            display: flex;
            align-items: center;
            font-weight: 600;
            margin-bottom: 6px;
            color: #22223b;
            font-size: 1.08rem;
        }
        .login-form label i {
            margin-right: 8px;
            color: #4facfe;
        }
        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1.5px solid #e1e5e9;
            font-size: 1.08rem;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px #4facfe11;
            outline: none;
            transition: border 0.2s;
        }
        .login-form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .login-form .remember {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.98rem;
        }
        .login-form .forgot {

        .login-form button {

            border-radius: 8px;

<body>
    <div class="bg-animation"></div>
    <nav>
    <div class="nav-left">🔍TruthLens</div>
        <div class="nav-right">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="features.html">Features</a>
            <a href="contact.html">Contact</a>
            <a href="user_dashboard.html" class="nav-link">Dashboard</a>
            <a href="login.html" class="login-nav-btn active" style="margin-left: 12px; border: 1.5px solid #4facfe; background: #fff; color: #4facfe; font-weight: 700; border-radius: 8px; padding: 8px 22px; box-shadow: 0 2px 8px #4facfe22; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
        </div>
    </nav>
    <div class="login-hero">
        
            <div class="login-hero" style="align-items: center; justify-content: center; min-height: 80vh;">
                <div class="login-form-card" style="display: flex; flex-direction: row; align-items: center; background: #fff; border-radius: 24px; box-shadow: 0 8px 32px #764ba220; padding: 0; max-width: 1280px; width: 100%; min-width: 340px; overflow: hidden;">
                    <div class="login-image-box" style="flex: 1 1 440px; display: flex; align-items: center; justify-content: center; background: none; height: 100%; min-width: 340px;">
                        <img src="/static/login.jpg" alt="Login Illustration" style="max-width: 600px; width: 44vw; min-width: 340px; height: auto; border-radius: 24px 0 0 24px; background: none; box-shadow: none; object-fit: contain; display: block; margin: 48px 0;" loading="lazy" />
                    </div>
                    <div class="login-form-box" style="flex: 1 1 440px; max-width: 540px; min-width: 340px; padding: 64px 56px 64px 56px; margin: 0; background: none; box-shadow: none; border-radius: 0;">
                        <h1>Login</h1>
                        <form class="login-form" id="loginForm" autocomplete="off">
                            <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                            <input type="text" id="username" name="username" required>
                            <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                            <input type="password" id="password" name="password" required>
                            <div class="login-form-row">
                                <label class="remember"><input type="checkbox" id="remember"> Remember me</label>
                                <a href="#" class="forgot">Forgot password?</a>
                            </div>
                            <button type="submit" id="loginBtn">Login</button>
                            <div id="errorMsg" style="color: #ef4444; margin-top: 12px; display: none; font-size: 0.9rem;"></div>
                            <div class="login-form-links">
                                <span>Don't have an account? <a href="register.html" class="register-link">Register here</a></span>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
</body>
<script>
// Backend API Login Integration
const API_BASE_CANDIDATES = [
    `${window.location.origin}/api`,
    'http://127.0.0.1:8000/api',
    'http://localhost:8000/api'
].filter((value, index, array) => value.startsWith('http') && array.indexOf(value) === index);

const TOKEN_ENDPOINT = '/auth/token/';

async function tryLoginAcrossOrigins(payload) {
    let lastError = 'Login failed. Please check credentials.';

    for (const baseUrl of API_BASE_CANDIDATES) {
        try {
            const response = await fetch(`${baseUrl}${TOKEN_ENDPOINT}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            let data = {};
            try {
                data = await response.json();
            } catch (_parseErr) {
                data = {};
            }

            if (response.ok && data.access && data.refresh) {
                return { ok: true, data };
            }

            if (response.status === 401) {
                lastError = data.detail || 'Invalid username or password.';
            } else if (response.status === 400) {
                lastError = data.detail || 'Invalid request. Please verify input.';
            } else {
                lastError = data.detail || `Login failed (${response.status}).`;
            }
        } catch (_networkErr) {
            lastError = 'Server connection error. Backend runserver check karein.';
        }
    }

    return { ok: false, error: lastError };
}

document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    
    if (loginForm) {
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            errorMsg.style.display = 'none';
            
            try {
                const result = await tryLoginAcrossOrigins({ username, password });

                if (result.ok) {
                    const data = result.data;
                    // Store tokens in localStorage
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('username', data.username || username);
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    // Redirect to detector page
                    window.location.href = '/static/fake_news_detector.html';
                } else {
                    // Show error message
                    errorMsg.textContent = result.error || 'Invalid username or password';
                    errorMsg.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = 'Server connection error. Please make sure backend is running.';
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    }
});
</script>
</html>
